<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Mechanics | SMR Digital Infrastructure Suite</title>
    <style>
        :root {
            --primary-dark: #0f1717;
            --secondary-dark: #1a2626;
            --accent-teal: #3d7a7a;
            --accent-gold: #d4af37;
            --text-light: #e0e6e6;
            --text-dim: #a0b0b0;
            --border-dim: #2c3d3d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background-color: var(--primary-dark);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--accent-teal);
        }

        .logo-placeholder {
            font-size: 2.8em;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .prospectus-header {
            background: var(--secondary-dark);
            padding: 30px;
            border-radius: 4px;
            margin: 40px 0;
            border-left: 6px solid var(--accent-teal);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1, h2, h3 {
            color: #ffffff;
            margin-top: 0;
        }

        .market-context {
            font-size: 1.1em;
            background-color: rgba(61, 122, 122, 0.1);
            padding: 20px;
            border: 1px solid var(--accent-teal);
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .highlight-text {
            color: var(--accent-gold);
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            background-color: var(--secondary-dark);
            border-radius: 4px;
            overflow: hidden;
        }

        table th {
            background-color: var(--accent-teal);
            color: white;
            text-align: left;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid var(--border-dim);
        }

        .acquisition-section {
            background-color: var(--secondary-dark);
            padding: 40px;
            border-radius: 4px;
            border: 1px solid var(--border-dim);
            margin-top: 60px;
        }

        .protocol-card {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-dim);
        }

        .protocol-card:last-child {
            border-bottom: none;
        }

        .protocol-title {
            color: var(--accent-teal);
            font-size: 1.25em;
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 80px;
            font-size: 0.85em;
            color: var(--text-dim);
            border-top: 1px solid var(--border-dim);
            padding-top: 30px;
        }
